<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background matching logo -->
  <rect width="32" height="32" rx="4" fill="#0D0D0D"/>
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <!-- Vertical meridian -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#FFFFFF" stroke-width="1.2"/>
  <!-- Horizontal equator -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#FFFFFF" stroke-width="1.2"/>
  <!-- Upper latitude arc -->
  <path d="M8.5,11 Q16,13.5 23.5,11" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Lower latitude arc -->
  <path d="M8.5,21 Q16,18.5 23.5,21" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Left longitude arc -->
  <path d="M16,6 Q11,16 16,26" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Right longitude arc -->
  <path d="M16,6 Q21,16 16,26" fill="none" stroke="#FFFFFF" stroke-width="1"/>
</svg>
